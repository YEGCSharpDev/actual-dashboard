name: Build and Publish Docker Image

# This triggers the action whenever you push code to the 'main' branch
# It also allows you to run it manually from the Actions tab (workflow_dispatch)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your code from the GitHub repository into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Log into Docker Hub using the secrets you configured
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Setup Docker Buildx (A modern builder that makes caching and multi-arch builds easier)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build the image using your Dockerfile and push it to your repo
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: preface8675/actual-dashboard:latest
